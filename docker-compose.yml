services:
  backend:
    build:
      context: ./parking
      dockerfile: Dockerfile
    container_name: springboot-backend
    image: parking-backend:latest
    ports:
      - "8080:8080"
      - "5005:5005"
    networks:
      - app-network
    depends_on: 
      - db

  frontend:
    build:
      context: ./parking_front
      dockerfile: Dockerfile
    container_name: sveltekit-frontend
    image: parking-frontend:latest
    ports:
      - "5173:5173"
    volumes:
      - ./parking_front:/app:z
      - /app/node_modules
    networks:
      - app-network
    depends_on:
      - backend

  db:
    image: postgres:15
    container_name: db-postgres
    environment:
      POSTGRES_DB: parking_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # <--- Behoudt je data bij een herstart!
    networks:
      - app-network

  adminer:
    image: adminer:latest
    container_name: adminer
    ports:
      - "8081:8080"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

# <--- Vergeet niet dit volume onderaan te declareren voor de database!
volumes:
  postgres_data: