spring:
  application:
    name: parking-system

  jackson:
    serialization:
      write-dates-as-timestamps: false

  # Use H2 in-memory database for tests
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  # Disable Redis for tests - use in-memory session
  session:
    store-type: none

  # SQL Initialization
  sql:
    init:
      mode: always
      data-locations: classpath:/db/seed-data.sql

  mail:
    host: localhost
    port: 1025
    username: test@test.com
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

security:
  jwt:
    secret: test-secret-key-at-least-32-characters-long-for-testing
    expiration-ms: 3600000

external-services:
  mapping: http://localhost:9090/mapping
  payment: http://localhost:9090/payment
  notification: http://localhost:9090/notification

app:
  mail:
    from: test@parking.com
  cors:
    allowed-origins: http://localhost:5173
  payment:
    mock-mode: true

# Disable logging of SQL in tests
logging:
  level:
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
