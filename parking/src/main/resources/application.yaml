spring:
  application:
    name: parking-system

  jackson:
    serialization:
      write-dates-as-timestamps: false

  datasource:
    url: jdbc:postgresql://db:5432/parking_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@parking.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Redis Configuration for Session Persistence
  session:
    store-type: redis
    redis:
      namespace: parking-sessions
      flush-mode: on-save

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 60000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

  # SQL Initialization (optional - for seed data)
  sql:
    init:
      mode: ${SQL_INIT_MODE:never}
      data-locations: classpath:/db/seed-data.sql

security:
  jwt:
    secret: ${JWT_SECRET:placeholder-secret-key-at-least-32-characters-long}
    expiration-ms: 3600000

external-services:
  mapping: ${MAPPING_SERVICE_URL:http://mapping-service/api}
  payment: ${PAYMENT_SERVICE_URL:http://payment-service/api}
  notification: ${NOTIFICATION_SERVICE_URL:http://notification-service/api}

app:
  mail:
    from: ${MAIL_FROM:noreply@parking.com}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  payment:
    mock-mode: ${PAYMENT_MOCK_MODE:true}
