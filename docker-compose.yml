services:
  backend:
    build:
      context: ./parking
      dockerfile: Dockerfile
    container_name: springboot-backend
    image: parking-backend:latest
    ports:
      - "8080:8080"
      - "5005:5005"
    networks:
      - app-network
    depends_on:
      - db
      - redis
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SQL_INIT_MODE: always
      PAYMENT_MOCK_MODE: "true"

  frontend:
    build:
      context: ./parking_front
      dockerfile: Dockerfile
    container_name: sveltekit-frontend
    image: parking-frontend:latest
    ports:
      - "5173:5173"
    volumes:
      - ./parking_front:/app:z
      - /app/node_modules
    networks:
      - app-network
    depends_on:
      - backend

  db:
    image: postgres:15
    container_name: db-postgres
    environment:
      POSTGRES_DB: parking_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5434:5432"  # Changed from 5432 to 5434 to avoid conflict with local postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:latest
    container_name: parking-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: adminer
    ports:
      - "8081:8080"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: