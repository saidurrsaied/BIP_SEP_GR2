openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost:8080
  description: Generated server url
paths:
  /api/zones/{id}:
    get:
      tags:
      - zone-controller
      operationId: getZoneById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ParkingZone"
    put:
      tags:
      - zone-controller
      operationId: updateZone
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateZoneRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ParkingZone"
    delete:
      tags:
      - zone-controller
      operationId: deleteZone
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
  /api/zones:
    get:
      tags:
      - zone-controller
      operationId: getAllZones
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ParkingZone"
    post:
      tags:
      - zone-controller
      operationId: createZone
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateZoneRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ParkingZone"
  /api/zones/{id}/spaces:
    post:
      tags:
      - zone-controller
      operationId: addSpace
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddSpaceRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ParkingSpace"
  /api/users/register:
    post:
      tags:
      - user-controller
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/User"
  /api/users/login:
    post:
      tags:
      - user-controller
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/spaces/{id}/vacate:
    post:
      tags:
      - occupation-controller
      operationId: vacate
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OccupationRecord"
  /api/spaces/{id}/occupy:
    post:
      tags:
      - occupation-controller
      operationId: occupy
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OccupyRequest"
        required: true
      responses:
        "200":
          description: OK
  /api/reservations:
    post:
      tags:
      - reservation-controller
      operationId: placeReservation
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceReservationRequest"
        required: true
      responses:
        "200":
          description: OK
  /api/reservations/{id}/update:
    post:
      tags:
      - reservation-controller
      operationId: updateReservation
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReservationRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Reservation"
  /api/reservations/{id}/complete:
    post:
      tags:
      - reservation-controller
      operationId: completeReservation
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
  /api/reservations/{id}/cancel:
    post:
      tags:
      - reservation-controller
      operationId: cancelReservation
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
  /api/billing/payment:
    post:
      tags:
      - billing-controller
      operationId: paymentProcessed
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentProcessedEvent"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Invoice"
  /api/billing/invoice:
    get:
      tags:
      - billing-controller
      operationId: getAllInvoices
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      tags:
      - billing-controller
      operationId: createInvoice
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Invoice"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Invoice"
  /api/zones/{id}/spaces/available:
    get:
      tags:
      - zone-controller
      operationId: getAvailableSpaces
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ParkingSpace"
  /api/zones/{id}/pricing:
    get:
      tags:
      - zone-controller
      operationId: getPricing
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PricingPolicy"
  /api/zones/{id}/map:
    get:
      tags:
      - map-overlay-controller
      operationId: getZoneMap
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MapData"
  /api/zones/map:
    get:
      tags:
      - map-overlay-controller
      operationId: getAllZonesMap
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MapData"
  /api/users/{id}:
    get:
      tags:
      - user-controller
      operationId: getUser
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/User"
  /api/users/{id}/role:
    get:
      tags:
      - user-controller
      operationId: getUserRole
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: string
                enum:
                - CITIZEN
                - ADMIN
  /api/users/me:
    get:
      tags:
      - user-controller
      operationId: getCurrentUser
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
  /api/spaces/{id}/occupancy:
    get:
      tags:
      - occupation-controller
      operationId: getOccupancy
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OccupationRecord"
  /api/reservations/{id}:
    get:
      tags:
      - reservation-controller
      operationId: getReservation
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Reservation"
  /api/reservations/users/{userId}:
    get:
      tags:
      - reservation-controller
      operationId: getReservationsForUser
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reservation"
  /api/billing/invoice/{id}:
    get:
      tags:
      - billing-controller
      operationId: getInvoice
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Invoice"
components:
  schemas:
    PricingPolicy:
      type: object
      properties:
        hourlyRateCents:
          type: integer
          format: int32
        slowMultiplier:
          type: integer
          format: int32
        fastMultiplier:
          type: integer
          format: int32
    UpdateZoneRequest:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        city:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        pricingPolicy:
          $ref: "#/components/schemas/PricingPolicy"
    ParkingSpace:
      type: object
      properties:
        spaceId:
          type: string
          format: uuid
        zone:
          $ref: "#/components/schemas/ParkingZone"
        status:
          type: string
          enum:
          - FREE
          - RESERVED
          - OCCUPIED
          - BLOCKED
        chargingPoint:
          type: string
          enum:
          - SLOW_CHARGER
          - FAST_CHARGER
          - "FALSE"
        level:
          type: string
        spaceNumber:
          type: string
    ParkingZone:
      type: object
      properties:
        zoneId:
          type: string
          format: uuid
        name:
          type: string
        city:
          type: string
        address:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        spaces:
          type: array
          items:
            $ref: "#/components/schemas/ParkingSpace"
        pricingPolicy:
          $ref: "#/components/schemas/PricingPolicy"
    CreateZoneRequest:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        city:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        pricingPolicy:
          $ref: "#/components/schemas/PricingPolicy"
    AddSpaceRequest:
      type: object
      properties:
        chargingPoint:
          type: string
          enum:
          - SLOW_CHARGER
          - FAST_CHARGER
          - "FALSE"
        level:
          type: string
        spaceNumber:
          type: string
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
          maxLength: 2147483647
          minLength: 8
        numberplate:
          type: string
        role:
          type: string
          enum:
          - CITIZEN
          - ADMIN
      required:
      - email
      - numberplate
      - password
    User:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        email:
          type: string
        role:
          type: string
          enum:
          - CITIZEN
          - ADMIN
        numberplate:
          type: string
        createdAt:
          type: string
          format: date-time
    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
      - email
      - password
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
    OccupationRecord:
      type: object
      properties:
        recordId:
          type: string
          format: uuid
        spaceId:
          type: string
          format: uuid
        userId:
          type: integer
          format: int64
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        hasChargingPoint:
          type: string
          enum:
          - SLOW_CHARGER
          - FAST_CHARGER
          - "FALSE"
    OccupyRequest:
      type: object
      properties:
        userId:
          type: integer
          format: int64
    PlaceReservationRequest:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        spaceId:
          type: string
          format: uuid
        from:
          type: string
          format: date-time
        until:
          type: string
          format: date-time
    UpdateReservationRequest:
      type: object
      properties:
        spaceId:
          type: string
          format: uuid
        from:
          type: string
          format: date-time
        until:
          type: string
          format: date-time
    Reservation:
      type: object
      properties:
        reservationId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        spaceId:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - PENDING
          - CONFIRMED
          - CANCELLED
          - COMPLETED
          - EXPIRED
        reservedFrom:
          type: string
          format: date-time
        reservedUntil:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
    PaymentProcessedEvent:
      type: object
      properties:
        invoiceId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        totalAmountCents:
          type: integer
          format: int64
        occurredAt:
          type: string
          format: date-time
    BillingItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        description:
          type: string
        amountCents:
          type: integer
          format: int64
        type:
          type: string
          enum:
          - PARKING
          - EV_CHARGING
        durationMinutes:
          type: integer
          format: int32
        amount:
          type: integer
          format: int64
    Invoice:
      type: object
      properties:
        invoiceId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        totalAmountCents:
          type: integer
          format: int64
        currency:
          type: string
        paidAt:
          type: string
          format: date-time
        status:
          type: string
          enum:
          - CREATED
          - PENDING
          - PAID
          - FAILED
        items:
          type: array
          items:
            $ref: "#/components/schemas/BillingItem"
        createdAt:
          type: string
          format: date-time
    MapData:
      type: object
      properties:
        zoneId:
          type: string
          format: uuid
        name:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        spaces:
          type: array
          items:
            $ref: "#/components/schemas/SpaceData"
    SpaceData:
      type: object
      properties:
        spaceId:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - FREE
          - RESERVED
          - OCCUPIED
          - BLOCKED
        chargingPoint:
          type: string
          enum:
          - SLOW_CHARGER
          - FAST_CHARGER
          - "FALSE"
